name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test shared module
        run: ./gradlew :src:shared:test

      - name: Build Fabric jar
        run: ./gradlew :src:fabric:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cinder-fabric-${{ github.sha }}
          path: src/fabric/build/libs/cinder-*.jar
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Cinder ${{ github.ref_name }}
          files: src/fabric/build/libs/cinder-*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
