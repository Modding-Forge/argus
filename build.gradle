// Root project: aggregator only.
// No `fabric-loom` plugin applied here - Loom is applied per-submodule in `fabric/build.gradle`,
// because Loom must only see a single `minecraft` configuration per JVM.
//
// `subprojects { ... }` carries shared values (group, version, toolchain) to all subprojects.
// Each subproject can still override anything it needs.

plugins {
    id 'base'
}

tasks.register('checkSharedNoForbiddenImports') {
    group = 'verification'
    description = 'Ensures src/shared stays free of Minecraft, loader, Sodium, and Mixin imports.'

    inputs.files(fileTree('src/shared/src/main/java') {
        include '**/*.java'
    })

    doLast {
        def forbidden = ~/^import\s+(net\.minecraft|net\.fabricmc|net\.neoforged|net\.caffeinemc|org\.spongepowered)\./
        def offenders = []
        inputs.files.files.each { file ->
            file.eachLine { line, number ->
                if (line ==~ forbidden) {
                    offenders << "${project.relativePath(file)}:${number}: ${line.trim()}"
                }
            }
        }
        if (!offenders.isEmpty()) {
            throw new GradleException("Forbidden imports in src/shared:\n" + offenders.join('\n'))
        }
    }
}

tasks.register('checkClientNoLoaderImports') {
    group = 'verification'
    description = 'Ensures src/client stays free of Fabric and NeoForge imports.'

    inputs.files(fileTree('src/client/src/main/java') {
        include '**/*.java'
    })

    doLast {
        def forbidden = ~/^import\s+(net\.fabricmc|net\.neoforged)\./
        def offenders = []
        inputs.files.files.each { file ->
            file.eachLine { line, number ->
                if (line ==~ forbidden) {
                    offenders << "${project.relativePath(file)}:${number}: ${line.trim()}"
                }
            }
        }
        if (!offenders.isEmpty()) {
            throw new GradleException("Loader imports in src/client:\n" + offenders.join('\n'))
        }
    }
}

tasks.named('check') {
    dependsOn 'checkSharedNoForbiddenImports', 'checkClientNoLoaderImports'
}

allprojects {
    group = project.maven_group
    version = project.mod_version

    repositories {
        // Central is enough for our `common` module; subprojects that need MC add their own
        // repositories via the Loom plugin in `fabric/build.gradle`.
        mavenCentral()
    }

    tasks.withType(JavaCompile).configureEach {
        // Compile-time and release target pinned via gradle.properties
        // (`java_release`). See the comment in `gradle.properties` for
        // why this is 21 today and what to raise it to in the future.
        sourceCompatibility = JavaVersion.toVersion(project.java_release)
        targetCompatibility = JavaVersion.toVersion(project.java_release)
        options.release = project.java_release as int
    }

    tasks.withType(Jar).configureEach {
        // Add a tiny machine-readable marker so anyone can tell at a glance which version they have.
        manifest {
            attributes([
                'Argus-Version'   : project.version,
                'Argus-Group'     : project.group,
                'Built-By'         : 'Gradle'
            ])
        }
    }
}
